<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Price Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-lg">
                    <div class="card-header bg-primary text-white text-center">
                        <h2><i class="bi bi-car-front-fill me-2"></i>Car Price Predictor</h2>
                        <p class="mb-0">ML-powered Car Price Prediction System</p>
                    </div>
                    <div class="card-body p-4">
                        <form id="predictForm">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label">Company *</label>
                                    <select class="form-select" id="company" required>
                                        <option value="">Select Company...</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Model *</label>
                                    <select class="form-select" id="name" required disabled>
                                        <option value="">Select Model...</option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Fuel Type *</label>
                                    <select class="form-select" id="fuel_type" required>
                                        <option value="">Select...</option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Year *</label>
                                    <input type="number" class="form-control" id="year" min="2000" max="2024" value="2020" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">KMs Driven *</label>
                                    <input type="number" class="form-control" id="kms_driven" min="0" value="50000" required>
                                </div>
                            </div>
                            <div class="text-center mt-4">
                                <button type="submit" class="btn btn-success btn-lg px-5">
                                    <i class="bi bi-calculator-fill me-2"></i>Predict Price
                                </button>
                            </div>
                        </form>
                        <hr>
                        <div id="result" class="text-center p-4 bg-light rounded" style="display: none;">
                            <h3 id="priceResult" class="text-success fw-bold"></h3>
                            <p class="lead mb-0">Estimated Price</p>
                            <button class="btn btn-outline-secondary mt-2" id="predictAgain">Predict Another</button>
                        </div>
                        <div id="loading" class="text-center" style="display: none;">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">Loading...</span>
                            </div>
                        </div>
                        <div id="error" class="alert alert-danger mt-3" style="display: none;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
